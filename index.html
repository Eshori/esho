<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: #28a745;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>My Product Store</h1>
</header>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Product">
        <div class="card-content">
            <h3>Gaming Mouse</h3>
            <p class="price">$25</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Product">
        <div class="card-content">
            <h3>Mechanical Keyboard</h3>
            <p class="price">$70</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Product">
        <div class="card-content">
            <h3>Wireless Headphones</h3>
            <p class="price">$50</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </div>

    <!-- Card 4 -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Product">
        <div class="card-content">
            <h3>Smart Watch</h3>
            <p class="price">$90</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </div>

</div>

<footer>
    <p>© 2026 My Store</p>
</footer>

</body>
</html>
